# ---------------------------------------------------------------------------
# docker-compose.yml
# Purpose: Spin up a local Kafka + Zookeeper environment for development,
# so the team does not depend on a shared/remote broker.
#
# This file is intentionally a PLACEHOLDER — no working service definitions
# are included. When implementing, define:
#
#   services:
#     zookeeper:
#       image: confluentinc/cp-zookeeper (or bitnami/zookeeper)
#       - expose the client port (2181)
#       - set required env vars (ZOOKEEPER_CLIENT_PORT, etc.)
#
#     kafka:
#       image: confluentinc/cp-kafka (or bitnami/kafka)
#       - depends_on: zookeeper
#       - expose broker port (9092) to the host, matching
#         KAFKA_BOOTSTRAP_SERVERS in .env
#       - set advertised listeners for local access
#
#   (optional) kafka-ui or kafdrop:
#     - a lightweight web UI to inspect topics/messages while debugging
#
# Dependencies: Docker + Docker Compose installed locally.
# Usage (once implemented): `docker compose -f docker/docker-compose.yml up -d`
# ---------------------------------------------------------------------------


version: "3.8"

# Local Kafka + Zookeeper environment for development. Matches the default
# KAFKA_BOOTSTRAP_SERVERS=localhost:9092 in .env.example.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml down

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: uberthinking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: uberthinking-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: uberthinking-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
