# Runs UberThinking's Spark code in a container so you don't have to install
# Java (or, on Windows, winutils) yourself. Spark runs in local mode inside
# the single "app" service.
#
# Usage (from the project root):
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml run --rm app python train_model.py
#   docker compose -f docker/docker-compose.yml run --rm app python streaming_job.py
#   docker compose -f docker/docker-compose.yml run --rm app python generate_stream.py
#   docker compose -f docker/docker-compose.yml up            # dashboard at :8501

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: uberthinking
    working_dir: /app
    # Mount the whole project so code edits and generated data/output/models
    # are shared live between your machine and the container.
    volumes:
      - ..:/app
    ports:
      - "8501:8501"
